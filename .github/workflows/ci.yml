name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # The Flexiband integration test downloads a 1.6 GB capture. Run it on a
      # single job (Linux / Julia 1) and skip it elsewhere, so the matrix stays
      # fast and the download is cached once for one OS instead of three. The
      # test passes on Linux/macOS/Windows; ongoing CI only needs one of them.
      TRACKING_SKIP_INTEGRATION_TEST: ${{ !(matrix.os == 'ubuntu-latest' && matrix.version == '1') }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          #- 'nightly'
        os:
          - ubuntu-latest
        include:
          - os: windows-latest
            version: '1'
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      # Cache the 1.6 GB Flexiband capture that the integration test downloads
      # into Tracking's Scratch.jl scratchspace, so it is fetched once and
      # reused across runs instead of re-downloaded on every job. The key is
      # fixed (the capture never changes) → bump the suffix to invalidate.
      # Only on the job that actually runs the integration test.
      - name: Cache Flexiband integration-test capture
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        uses: actions/cache@v4
        with:
          path: ~/.julia/scratchspaces/10b2438b-ffd4-5096-aa58-44041d5c8f3b/flexiband_iii_7a
          key: flexiband-iii-7a-short-v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}