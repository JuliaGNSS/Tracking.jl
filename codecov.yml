# Coverage gates. The Int16 (and fused) SIMD backends contain host-CPU-gated
# alternate paths (the AVX-512 `llvmcall`, the exact-Int32 fallback, and the
# non-x86 NEON branch) — only ONE variant compiles/executes per machine, so a
# large share of those lines is structurally uncoverable on any single CI runner
# and the measured coverage swings by ~2 % depending on which CPU the runner
# lands on. The thresholds below absorb that structural, one-time drop from
# adding the SIMD backend (base 98.8 % → 96.9 %) while still failing on a real
# regression.
coverage:
  status:
    project:
      default:
        target: auto
        # Adding the ~450-line host-gated SIMD backend drops aggregate coverage
        # ~2 % (unavoidable — the off-host SIMD variants can't run here). Allow
        # that; anything worse than a 3 % drop is a genuine regression.
        threshold: 3%
    patch:
      default:
        # New code should be well covered, but the diff is SIMD-heavy and its
        # measured coverage is platform-dependent (~90 % on CI, higher locally),
        # so target 80 % for margin rather than flapping around the exact value.
        target: 80%
        threshold: 1%
