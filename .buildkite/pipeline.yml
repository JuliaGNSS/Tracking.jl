steps:
  - label: "Julia v1.11 - KA + CUDA Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
    commands:
      - julia --project -e 'using Pkg; Pkg.instantiate(); Pkg.add("CUDA")'
      - julia --project test/ka_gpu_tests.jl
    agents:
      queue: "juliagpu"
      cuda: "*"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 60
  - label: "Benchmark: KA-CUDA vs CPU"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
    commands:
      - julia --project=benchmark -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - julia --project=benchmark benchmark/run_gpu_benchmarks.jl 2>&1 | tee benchmark_results.txt
      - BODY=$$(awk '/^## Benchmark/,0' benchmark_results.txt); if [ -n "$$BODY" ]; then echo "$$BODY" | buildkite-agent annotate --style "info" --context "benchmarks"; fi
    agents:
      queue: "juliagpu"
      cuda: "*"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 60
