# The GPU CI was wired to `ext/TrackingCUDAExt/test/runtests.jl`. The
# CUDA extension was removed in v2.0.0 (commit 22a27b4); GPU support
# will return via KernelAbstractions in a follow-up PR. Until then
# this pipeline runs a no-op step so the Buildkite integration stays
# registered and the PR's CI status surface remains green.
steps:
  - label: "GPU CI placeholder (CUDA extension removed in v2.0.0)"
    command: |
      echo "TrackingCUDAExt was removed in v2.0.0; GPU CI will return"
      echo "when the KernelAbstractions-based replacement lands."
    agents:
      queue: "cuda"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 5
